<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>診所預約表單</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f7fafd;
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .form-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 500px;
    }
    h2 {
      text-align: center;
      color: #2a6db0;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 0.7rem;
      background-color: #2a6db0;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1e5a96;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>診所預約表單</h2>
    <form id="reservationForm">
      <div class="form-group">
        <label for="date">預約日期：</label>
        <input type="date" id="date" name="date" required />
      </div>

      <div class="form-group">
        <label for="session">診別：</label>
        <select id="session" name="session" required>
          <option value="早上診">早上診</option>
          <option value="下午診">下午診</option>
          <option value="晚上診">晚上診</option>
        </select>
      </div>

      <div class="form-group">
        <label for="visitType">初診或複診：</label>
        <select id="visitType" name="visitType" onchange="toggleIDField()" required>
          <option value="初診">初診</option>
          <option value="複診" selected>複診</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">姓名：</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="birth">出生年月日：</label>
        <input type="date" id="birth" name="birth" required />
      </div>

      <div class="form-group" id="idGroup" style="display: none;">
        <label for="idNumber">身分證字號：</label>
        <input type="text" id="idNumber" name="idNumber" placeholder="限初診填寫" />
      </div>

      <div class="form-group">
        <label for="phone">電話：</label>
        <input type="tel" id="phone" name="phone" required />
      </div>

      <button type="submit">送出預約</button>
    </form>
  </div>

  <script>
    function toggleIDField() {
      const visitType = document.getElementById("visitType").value;
      const idGroup = document.getElementById("idGroup");
      if (visitType === "初診") {
        idGroup.style.display = "block";
        document.getElementById("idNumber").required = true;
      } else {
        idGroup.style.display = "none";
        document.getElementById("idNumber").required = false;
      }
    }

    window.onload = toggleIDField;

    document.getElementById("reservationForm").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("預約已送出，我們會與您聯絡。\n點擊下方按鈕返回 LINE！");
      window.location.href = "https://line.me/R/ti/p/@你的官方帳號ID"; // 換成你自己的 LINE OA ID
    });
  </script>
</body>
</html>
