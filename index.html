<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>診所預約表單</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f8fc;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .form-container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #1e88e5;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #1976d2;
      color: white;
      border: none;
      margin-top: 2rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>診所預約表單</h2>
    <form id="reservationForm">
      <label for="appointmentDate">預約日期：</label>
      <input type="date" id="appointmentDate" name="appointmentDate" required />

      <label for="session">診別：</label>
      <select id="session" name="session" required>
        <option value="">請先選擇日期</option>
      </select>

      <label for="type">初診或複診：</label>
      <select id="type" name="type" required>
        <option value="初診">初診</option>
        <option value="複診">複診</option>
      </select>

      <label for="name">姓名：</label>
      <input type="text" id="name" name="name" required />

      <label for="birth">出生年月日：</label>
      <input type="date" id="birth" name="birth" required />

      <label for="idNumber" id="idLabel">身分證字號：</label>
      <input type="text" id="idNumber" name="idNumber" />

      <label for="phone">電話：</label>
      <input type="tel" id="phone" name="phone" required />

      <button type="submit">送出預約</button>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const dateInput = document.getElementById("appointmentDate");
      const sessionSelect = document.getElementById("session");
      const typeSelect = document.getElementById("type");
      const idInput = document.getElementById("idNumber");
      const idLabel = document.getElementById("idLabel");

      dateInput.addEventListener("change", function () {
        const selectedDate = new Date(dateInput.value);
        const dayOfWeek = selectedDate.getDay();

        const sessionOptions = {
          0: [], // Sunday
          1: ["早上診", "下午診"],
          2: ["早上診", "晚上診"],
          3: ["早上診", "下午診"],
          4: ["早上診", "晚上診"],
          5: ["早上診", "下午診"],
          6: ["早上診"],
        };

        sessionSelect.innerHTML = "";

        if (!sessionOptions[dayOfWeek] || sessionOptions[dayOfWeek].length === 0) {
          alert("星期日不開診，請選擇其他日期。");
          dateInput.value = "";
          return;
        }

        sessionOptions[dayOfWeek].forEach(function (optionText) {
          const option = document.createElement("option");
          option.value = optionText;
          option.textContent = optionText;
          sessionSelect.appendChild(option);
        });
      });

      typeSelect.addEventListener("change", function () {
        const isFirstVisit = typeSelect.value === "初診";
        idInput.required = isFirstVisit;
        idLabel.style.display = isFirstVisit ? "block" : "none";
        idInput.style.display = isFirstVisit ? "block" : "none";
      });

      // 預設載入時也檢查一次
      typeSelect.dispatchEvent(new Event("change"));
    });
  </script>
</body>
</html>
