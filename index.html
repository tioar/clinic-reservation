
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>診所預約表單</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    label { display: block; margin: 1em 0 0.3em; }
    input, select, button { width: 100%; padding: 0.5em; font-size: 1em; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>診所預約表單</h2>
  <form id="reserveForm">
    <label>預約日期：
      <input type="date" name="date" required>
    </label>
    <label>診別：
      <select name="session" required>
        <option value="早上診">早上診</option>
        <option value="下午診">下午診</option>
        <option value="晚上診">晚上診</option>
      </select>
    </label>
    <label>初診或複診：
      <select name="visitType" id="visitType" required onchange="toggleIdField()">
        <option value="初診">初診</option>
        <option value="複診">複診</option>
      </select>
    </label>
    <label id="idField">
      身分證字號：
      <input type="text" name="id" maxlength="10">
    </label>
    <label>姓名：
      <input type="text" name="name" required>
    </label>
    <label>電話：
      <input type="tel" name="phone" required>
    </label>
    <label>出生年月日：
      <input type="date" name="birth" required>
    </label>
    <button type="submit">送出預約</button>
  </form>
  <div id="result"></div>
  <script>
    function toggleIdField() {
      const type = document.getElementById("visitType").value;
      const idField = document.getElementById("idField");
      if (type === "初診") {
        idField.classList.remove("hidden");
      } else {
        idField.classList.add("hidden");
      }
    }

    document.getElementById("reserveForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const json = {};
      formData.forEach((v, k) => json[k] = v);

      try {
        const res = await fetch("https://script.google.com/macros/s/你的AppsScript網址/exec", {
          method: "POST",
          body: JSON.stringify(json),
          headers: { "Content-Type": "application/json" }
        });
        const result = await res.text();
        document.getElementById("result").innerHTML = `<p>${result}</p>`;
      } catch (err) {
        document.getElementById("result").innerHTML = "<p>⚠️ 發生錯誤，請稍後再試。</p>";
      }
    });
  </script>
</body>
</html>
